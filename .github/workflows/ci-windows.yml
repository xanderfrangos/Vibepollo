---
name: CI-Windows
permissions: {}

on:
  workflow_call:
    inputs:
      release_commit:
        required: true
        type: string
      release_version:
        required: true
        type: string
      release_tag:
        required: false
        type: string
        default: ''
      symbol_product_name:
        required: true
        type: string
      symbol_release_prefix:
        required: true
        type: string
      publish_symbols:
        required: false
        type: boolean
        default: false
      symbol_release_repo:
        required: false
        type: string
        default: Nonary/vibeshine_symbols
      symbol_release_tag:
        required: false
        type: string
        default: ''
      symbol_release_draft:
        required: false
        type: boolean
        default: false
      upload_symbols_artifact:
        required: false
        type: boolean
        default: false
      require_signpath_signing:
        required: false
        type: boolean
        default: false
      require_truehdr_runtime:
        required: false
        type: boolean
        default: false
      truehdr_runtime_release_repo:
        required: false
        type: string
        default: Nonary/vibeshine_truehdr_runtime
      truehdr_runtime_release_tag:
        required: false
        type: string
        default: v1.0.0
      truehdr_runtime_asset_name:
        required: false
        type: string
        default: ''
      signpath_organization_id:
        required: false
        type: string
        default: 1ba0e884-7ab4-43e6-aa84-9b2c7e3fba15
      signpath_project_slug:
        required: false
        type: string
        default: Vibepollo
      signpath_signing_policy_slug:
        required: false
        type: string
        default: test-signing
      signpath_artifact_configuration_slug:
        required: false
        type: string
        # Setup-EXE (outer VibepolloSetup.exe) artifact configuration slug.
        # See docs/signpath/setup-exe.artifact-config.xml.
        default: setup-exe
      signpath_msi_artifact_configuration_slug:
        required: false
        type: string
        # Deep-signs first-party PEs inside the MSI, then the MSI container.
        # See docs/signpath/msi-file-apollo.artifact-config.xml.
        default: msi-file-apollo
    secrets:
      symbol_token:
        required: false
      signpath_api_token:
        required: false
      truehdr_runtime_token:
        required: false

jobs:
  build_windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    outputs:
      msi_name: ${{ steps.package-windows-msi.outputs.msi_name }}
      symbol_pack_name: ${{ steps.package-windows-symbols.outputs.symbol_pack_name }}
      symbols_artifact_id: ${{ steps.upload-windows-symbols.outputs.artifact-id }}
      unsigned_msi_artifact_id: ${{ steps.upload-unsigned-msi-for-package.outputs.artifact-id }}
      unsigned_msi_signpath_artifact_id: ${{ steps.upload-unsigned-msi.outputs.artifact-id }}
      versioninfo_artifact_id: ${{ steps.upload-windows-version-metadata.outputs.artifact-id }}
    env:
      NODE_VERSION: 22.22.2
      SIGNPATH_ENABLED: ${{ secrets.signpath_api_token != '' }}
      SIGNPATH_ORGANIZATION_ID: ${{ inputs.signpath_organization_id }}
      SIGNPATH_PROJECT_SLUG: ${{ inputs.signpath_project_slug }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ inputs.signpath_signing_policy_slug }}
      SIGNPATH_MSI_ARTIFACT_CONFIGURATION_SLUG: ${{ inputs.signpath_msi_artifact_configuration_slug }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ inputs.signpath_artifact_configuration_slug }}
      VIBEPOLLO_DEPS_DIR: ${{ github.workspace }}\.vibepollo-deps
      WEBRTC_ROOT: ${{ github.workspace }}\.vibepollo-deps\libwebrtc\out
      TRUEHDR_RUNTIME_ROOT: ${{ github.workspace }}\.vibeshine-deps\truehdr-runtime
    defaults:
      run:
        shell: msys2 {0}
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2022
            arch: x86_64
            msystem: ucrt64
            toolchain: ucrt-x86_64
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          submodules: recursive

      - name: Resolve Windows build version
        shell: pwsh
        env:
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          $ErrorActionPreference = 'Stop'

          $buildVersion = $env:INPUT_RELEASE_VERSION

          if ([string]::IsNullOrWhiteSpace($buildVersion)) {
            if ($env:GITHUB_REF_VALUE -like 'refs/tags/*' -and -not [string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME_VALUE)) {
              $buildVersion = $env:GITHUB_REF_NAME_VALUE
            }
          }

          if ([string]::IsNullOrWhiteSpace($buildVersion)) {
            $buildVersion = '0.0.0'
          }

          if ($buildVersion -match '^v(.+)$') {
            $buildVersion = $Matches[1]
          }

          "Resolved Windows build version: $buildVersion"
          "BUILD_VERSION=$buildVersion" >> $env:GITHUB_ENV

      - name: Setup Dependencies Windows
        id: setup-msys2
        # if a dependency needs to be pinned, see https://github.com/LizardByte/build-deps/pull/186
        uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda  # v2.30.0
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            wget

      - name: Update Windows dependencies
        env:
          # MSYSTEM is a built-in environment variable of MSYS2.
          # Do not use this environment variable name.
          MATRIX_MSYSTEM: ${{ matrix.msystem }}
          TOOLCHAIN: ${{ matrix.toolchain }}
        shell: msys2 {0}
        run: |
          # variables
          declare -A pinned_deps

          # dependencies
          dependencies=(
            "git"
            "mingw-w64-${TOOLCHAIN}-boost"
            "mingw-w64-${TOOLCHAIN}-cmake"
            "mingw-w64-${TOOLCHAIN}-cppwinrt"
            "mingw-w64-${TOOLCHAIN}-curl-winssl"
            "mingw-w64-${TOOLCHAIN}-gcc"
            "mingw-w64-${TOOLCHAIN}-graphviz"
            "mingw-w64-${TOOLCHAIN}-miniupnpc"
            "mingw-w64-${TOOLCHAIN}-nlohmann-json"
            "mingw-w64-${TOOLCHAIN}-onevpl"
            "mingw-w64-${TOOLCHAIN}-openssl"
            "mingw-w64-${TOOLCHAIN}-opus"
            "mingw-w64-${TOOLCHAIN}-toolchain"
          )

          if [[ "${MATRIX_MSYSTEM}" == "ucrt64" ]]; then
            dependencies+=(
              "mingw-w64-${TOOLCHAIN}-MinHook"
              "mingw-w64-${TOOLCHAIN}-ninja"
              "mingw-w64-${TOOLCHAIN}-tools"
            )
          fi

          # do not modify below this line

          ignore_packages=()
          tarballs=""
          for pkg in "${!pinned_deps[@]}"; do
            ignore_packages+=("${pkg}")
            version="${pinned_deps[$pkg]}"
            tarball="${pkg}-${version}-any.pkg.tar.zst"

            # download working version
            wget "https://repo.msys2.org/mingw/${MATRIX_MSYSTEM}/${tarball}"

            tarballs="${tarballs} ${tarball}"
          done

          # Create the ignore string for pacman
          ignore_list=$(IFS=,; echo "${ignore_packages[*]}")

          # install pinned dependencies
          if [ -n "${tarballs}" ]; then
            pacman -U --noconfirm "${tarballs}"
          fi

          # Only add --ignore if we have packages to ignore
          if [ -n "${ignore_list}" ]; then
            pacman -Syu --noconfirm --ignore="${ignore_list}" "${dependencies[@]}"
          else
            pacman -Syu --noconfirm "${dependencies[@]}"
          fi

      - name: Setup dotnet  # needed for wix
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309  # v5.1.0
        with:
          dotnet-version: '10.x'

      - name: Setup NodeJS
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: NodeJS Path
        shell: pwsh
        run: |
          # get NodeJS PATH
          $NODEJS_BINARY_PATH = (Get-Command node).Source
          $NODEJS_PATH = Split-Path -Path "$NODEJS_BINARY_PATH" -Parent

          # setup environment variables
          echo "NODEJS_PATH=$NODEJS_PATH" >> $env:GITHUB_ENV

          # step output
          echo "nodejs-path=$NODEJS_PATH"
          echo "nodejs-path=$NODEJS_PATH" >> $env:GITHUB_OUTPUT

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y

      - name: Resolve WebRTC toolchain
        shell: pwsh
        env:
          MATRIX_MSYSTEM: ${{ matrix.msystem }}
          MSYS2_LOCATION: ${{ steps.setup-msys2.outputs.msys2-location }}
        run: |
          $ErrorActionPreference = 'Stop'

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe was not found at $vswhere"
          }

          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath) -or -not (Test-Path -LiteralPath $vsPath)) {
            throw 'Visual Studio with the VC toolchain was not found.'
          }

          $kitsRoot = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots' -Name KitsRoot10).KitsRoot10
          if ([string]::IsNullOrWhiteSpace($kitsRoot) -or -not (Test-Path -LiteralPath $kitsRoot)) {
            throw 'Windows SDK KitsRoot10 was not found.'
          }

          if ([string]::IsNullOrWhiteSpace($env:MSYS2_LOCATION) -or -not (Test-Path -LiteralPath $env:MSYS2_LOCATION)) {
            throw "MSYS2 location was not found: $($env:MSYS2_LOCATION)"
          }

          $msys2Bin = Join-Path $env:MSYS2_LOCATION "$($env:MATRIX_MSYSTEM)\bin"
          if (-not (Test-Path -LiteralPath $msys2Bin)) {
            throw "MSYS2 bin directory was not found: $msys2Bin"
          }

          "WEBRTC_VS_PATH=$vsPath" >> $env:GITHUB_ENV
          "WEBRTC_WINSDK_DIR=$kitsRoot" >> $env:GITHUB_ENV
          "WEBRTC_MSYS2_BIN=$msys2Bin" >> $env:GITHUB_ENV

      - name: Download virtual display driver package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          LIBVIRTUALDISPLAY_RELEASE_TAG: v1.6.0
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseTag = $env:LIBVIRTUALDISPLAY_RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw 'Unable to resolve a libvirtualdisplay release tag.'
          }

          $releaseVersion = $releaseTag -replace '^v', ''
          $downloadDir = Join-Path $PWD 'libvirtualdisplay-release'
          $extractDir = Join-Path $downloadDir 'extract'
          New-Item -ItemType Directory -Force -Path $downloadDir, $extractDir | Out-Null

          gh release download $releaseTag `
            --repo Nonary/libvirtualdisplay `
            --pattern "libvirtualdisplay-$releaseVersion-windows-x64.zip" `
            --dir $downloadDir `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download libvirtualdisplay release package $releaseTag."
          }

          $zip = Get-ChildItem -LiteralPath $downloadDir -File -Filter "libvirtualdisplay-$releaseVersion-windows-x64.zip" -ErrorAction Stop |
            Select-Object -First 1
          if (-not $zip) {
            throw "libvirtualdisplay release package was not downloaded for $releaseTag."
          }

          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extractDir -Force

          $packageRoot = Get-ChildItem -LiteralPath $extractDir -Directory -Recurse -ErrorAction Stop |
            Where-Object {
              (Test-Path -LiteralPath (Join-Path $_.FullName 'driver\SunshineVirtualDisplayDriver.dll') -PathType Leaf) -and
              (Test-Path -LiteralPath (Join-Path $_.FullName 'driver\SunshineVirtualDisplayDriver.inf') -PathType Leaf) -and
              (Test-Path -LiteralPath (Join-Path $_.FullName 'tools\virtualdisplay_probe.exe') -PathType Leaf)
            } |
            Sort-Object -Property LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $packageRoot) {
            throw 'The virtual display driver package did not produce a driver/tools payload root.'
          }

          "VDD_PREBUILT_PACKAGE_DIR=$($packageRoot.FullName)" >> $env:GITHUB_ENV
          "Using virtual display driver package: $($packageRoot.FullName)"

      - name: Download pinned WebRTC artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          .\scripts\download_webrtc_release.ps1 `
            -ManifestPath .\third-party\webrtc-artifacts\windows-x64.json `
            -OutDir $env:WEBRTC_ROOT `
            -GitHubToken $env:GH_TOKEN

      - name: Download pinned TrueHDR runtime
        if: inputs.require_truehdr_runtime
        shell: pwsh
        env:
          TRUEHDR_RUNTIME_TOKEN: ${{ secrets.truehdr_runtime_token || github.token }}
          TRUEHDR_RUNTIME_RELEASE_REPO: ${{ inputs.truehdr_runtime_release_repo }}
          TRUEHDR_RUNTIME_RELEASE_TAG: ${{ inputs.truehdr_runtime_release_tag }}
          TRUEHDR_RUNTIME_ASSET_NAME: ${{ inputs.truehdr_runtime_asset_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $args = @{
            Repository = $env:TRUEHDR_RUNTIME_RELEASE_REPO
            Tag = $env:TRUEHDR_RUNTIME_RELEASE_TAG
            OutDir = $env:TRUEHDR_RUNTIME_ROOT
            GitHubToken = $env:TRUEHDR_RUNTIME_TOKEN
          }
          if (-not [string]::IsNullOrWhiteSpace($env:TRUEHDR_RUNTIME_ASSET_NAME)) {
            $args.AssetName = $env:TRUEHDR_RUNTIME_ASSET_NAME
          }

          .\scripts\download_truehdr_runtime_release.ps1 @args
          "SUNSHINE_TRUEHDR_RUNTIME_DIR=$env:TRUEHDR_RUNTIME_ROOT" >> $env:GITHUB_ENV

      - name: Build Windows
        shell: msys2 {0}
        env:
          # MSYSTEM is a built-in environment variable of MSYS2.
          # Do not use this environment variable name.
          MATRIX_MSYSTEM: ${{ matrix.msystem }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          COMMIT: ${{ inputs.release_commit }}
          REQUIRE_TRUEHDR_RUNTIME: ${{ inputs.require_truehdr_runtime }}
        run: |
          echo "Using BUILD_VERSION=${BUILD_VERSION}"

          # Prefer the pinned actions/setup-node runtime over rolling MSYS2 packages.
          NODEJS_PATH=$(cygpath -u "$NODEJS_PATH")
          export PATH="${NODEJS_PATH}:$PATH"
          NPM_PATH="$(cygpath -m "${NODEJS_PATH}/npm.cmd")"
          echo "Using node: $(command -v node) ($(node --version))"
          echo "Using npm: ${NPM_PATH} ($(npm --version))"
          vdd_prebuilt_arg=()
          if [[ -n "${VDD_PREBUILT_PACKAGE_DIR:-}" ]]; then
            vdd_prebuilt_arg=(-DSUNSHINE_LIBVIRTUALDISPLAY_PREBUILT_DIR="$(cygpath -u "${VDD_PREBUILT_PACKAGE_DIR}")")
            echo "Using prebuilt virtual display driver package: ${VDD_PREBUILT_PACKAGE_DIR}"
          fi
          truehdr_runtime_arg=()
          if [[ "${REQUIRE_TRUEHDR_RUNTIME}" == "true" ]]; then
            truehdr_runtime_arg=(
              -DSUNSHINE_TRUEHDR_RUNTIME_DIR="$(cygpath -u "${SUNSHINE_TRUEHDR_RUNTIME_DIR}")"
              -DSUNSHINE_REQUIRE_TRUEHDR_RUNTIME=ON
            )
            echo "Using pinned TrueHDR runtime: ${SUNSHINE_TRUEHDR_RUNTIME_DIR}"
          fi

          mkdir -p build
          cmake \
            -B build \
            -G Ninja \
            -S . \
            -DBUILD_WERROR=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_DOCS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DSUNSHINE_ENABLE_WEBRTC=ON \
            -DWEBRTC_ROOT="$(cygpath -u "${WEBRTC_ROOT}")" \
            -DWEBRTC_INCLUDE_DIR="$(cygpath -u "${WEBRTC_ROOT}")/include" \
            -DWEBRTC_LIBRARY="$(cygpath -u "${WEBRTC_ROOT}")/lib/libwebrtc.dll.a" \
            -DWEBRTC_MSYS2_BIN="$(cygpath -u "${WEBRTC_MSYS2_BIN}")" \
            -DWEBRTC_VS_PATH="$(cygpath -u "${WEBRTC_VS_PATH}")" \
            -DWEBRTC_WINSDK_DIR="$(cygpath -u "${WEBRTC_WINSDK_DIR}")" \
            -DNPM="${NPM_PATH}" \
            -DSUNSHINE_ASSETS_DIR=assets \
            -DSUNSHINE_PUBLISHER_NAME="${GITHUB_REPOSITORY_OWNER}" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://app.lizardbyte.dev" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://app.lizardbyte.dev/support" \
            "${vdd_prebuilt_arg[@]}" \
            "${truehdr_runtime_arg[@]}"
          echo "::add-matcher::.github/matchers/gcc.json"
          cmake --build build --target all -j "$(nproc)"
          echo "::remove-matcher owner=gcc::"

      - name: Install cv2pdb
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_symbols || inputs.upload_symbols_artifact
        shell: pwsh
        env:
          CV2PDB_VERSION: "0.54"
        run: |
          $ErrorActionPreference = 'Stop'
          $cv2pdbDir = Join-Path $env:RUNNER_TEMP 'cv2pdb'
          $cv2pdbZip = Join-Path $env:RUNNER_TEMP 'cv2pdb.zip'
          $cv2pdbUrl = "https://github.com/rainers/cv2pdb/releases/download/v${env:CV2PDB_VERSION}/cv2pdb-${env:CV2PDB_VERSION}.zip"

          Invoke-WebRequest -Uri $cv2pdbUrl -OutFile $cv2pdbZip
          Expand-Archive -Path $cv2pdbZip -DestinationPath $cv2pdbDir -Force
          $cv2pdbExe = Get-ChildItem -Path $cv2pdbDir -Recurse -Filter cv2pdb64.exe -File | Select-Object -First 1
          if (-not $cv2pdbExe) {
            throw 'cv2pdb64.exe was not found in the downloaded archive.'
          }
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $cv2pdbExe.FullName -Parent)

      - name: Generate Windows PDB
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_symbols || inputs.upload_symbols_artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $executables = @(
            '.\build\sunshine.exe',
            '.\build\tools\audio-info.exe',
            '.\build\tools\dxgi-info.exe',
            '.\build\tools\playnite-launcher.exe',
            '.\build\tools\sunshine_display_helper.exe',
            '.\build\tools\sunshine_wgc_capture.exe',
            '.\build\tools\sunshinesvc.exe'
          )

          foreach ($exe in $executables) {
            if (Test-Path -LiteralPath $exe) {
              & cv2pdb64.exe $exe
            }
          }

          $sunshineSvc = '.\build\tools\sunshinesvc.exe'
          $sunshineSvcPayload = '.\build\wix_payload\tools\sunshinesvc.exe'
          if ((Test-Path -LiteralPath $sunshineSvc) -and (Test-Path -LiteralPath $sunshineSvcPayload)) {
            Copy-Item -LiteralPath $sunshineSvc -Destination $sunshineSvcPayload -Force
          }

      - name: Package Windows Symbols
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_symbols || inputs.upload_symbols_artifact
        id: package-windows-symbols
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          SYMBOL_PRODUCT_NAME: ${{ inputs.symbol_product_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseVersion = $env:RELEASE_VERSION
          if ($releaseVersion -match '^v(.+)$') {
            $releaseVersion = $Matches[1]
          }

          $symbolsRoot = Join-Path $PWD 'symbols'
          $artifactName = "$($env:SYMBOL_PRODUCT_NAME)Symbols-$releaseVersion-windows-x64.7z"
          $artifactPath = Join-Path $symbolsRoot $artifactName
          "symbol_pack_name=$artifactName" >> $env:GITHUB_OUTPUT

          New-Item -ItemType Directory -Force -Path $symbolsRoot | Out-Null

          $pdbFiles = Get-ChildItem -Path build -Recurse -Filter *.pdb -File |
            Where-Object { $_.FullName -notlike '*\cpack_artifacts\*' }

          if (-not $pdbFiles) {
            throw 'No PDB files were produced.'
          }

          $buildRoot = (Resolve-Path build).Path
          $pdbPaths = @($pdbFiles | ForEach-Object { [System.IO.Path]::GetRelativePath($buildRoot, $_.FullName) })
          Push-Location $buildRoot
          try {
            & 7z a $artifactPath $pdbPaths
          } finally {
            Pop-Location
          }

      - name: Strip Windows binaries
        shell: msys2 {0}
        run: |
          set -euo pipefail

          mapfile -d '' binaries < <(
            find build -type f \( -name '*.exe' -o -name '*.dll' \) \
              ! -path '*/cpack_artifacts/*' \
              ! -path '*/CMakeFiles/*' \
              ! -path '*/_deps/*' \
              ! -path '*/tests/*' \
              -print0
          )

          if (( ${#binaries[@]} == 0 )); then
            echo "No Windows binaries found to strip."
            exit 0
          fi

          strip --strip-debug --strip-unneeded "${binaries[@]}"

          for binary in "${binaries[@]}"; do
            if objdump -h "${binary}" | grep -Eq ' \.(debug|zdebug)'; then
              echo "Unstripped debug sections remain in ${binary}" >&2
              exit 1
            fi
          done

      # WiX already installed before configure so env:WIX is available

      - name: Validate SignPath configuration
        shell: msys2 {0}
        env:
          REQUIRE_SIGNPATH_SIGNING: ${{ inputs.require_signpath_signing }}
        run: |
          set -euo pipefail

          if [[ "${REQUIRE_SIGNPATH_SIGNING}" == "true" && "${SIGNPATH_ENABLED}" != "true" ]]; then
            echo "SignPath signing is required for this run, but signpath_api_token was not provided." >&2
            exit 1
          fi

          if [[ "${SIGNPATH_ENABLED}" == "true" ]]; then
            echo "Windows installer will be submitted to SignPath after GitHub artifact upload."
            echo "SignPath project: ${SIGNPATH_PROJECT_SLUG} / ${SIGNPATH_SIGNING_POLICY_SLUG}"
            echo "Two origin-verified requests: (1) MSI deep-sign '${SIGNPATH_MSI_ARTIFACT_CONFIGURATION_SLUG}', (2) setup EXE '${SIGNPATH_ARTIFACT_CONFIGURATION_SLUG}'."
            echo "Both artifact configurations must exist in the SignPath portal (see docs/signpath/)."
            if [[ -z "${SIGNPATH_MSI_ARTIFACT_CONFIGURATION_SLUG}" ]]; then
              echo "signpath_msi_artifact_configuration_slug is required so SignPath can deep-sign the MSI payload (sunshine.exe, tools, uninstall.exe, DLLs)." >&2
              exit 1
            fi
            if [[ -z "${SIGNPATH_ARTIFACT_CONFIGURATION_SLUG}" ]]; then
              echo "signpath_artifact_configuration_slug is required so SignPath can sign the outer setup EXE with an explicit PE configuration." >&2
              exit 1
            fi
          else
            echo "signpath_api_token was not provided; Windows installer artifact will remain unsigned."
          fi

      - name: Package Windows MSI
        id: package-windows-msi
        shell: msys2 {0}
        run: |
          mkdir -p unsigned-signpath-msi
          cd build

          set -euo pipefail

          # Build only the MSI first. SignPath credentials stay out of this
          # step so the MSI is signed from a GitHub artifact with origin
          # verification, including nested files such as uninstall.exe.
          cmake --build . --target package_msi -j "$(nproc)"

          msi_path=$(ls -t ./cpack_artifacts/*.msi 2>/dev/null | head -n 1 || true)
          if [[ -z "${msi_path}" ]]; then
            echo "Expected MSI was not produced." >&2
            find ./cpack_artifacts -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

          msi_name="$(basename "${msi_path}")"
          cp "${msi_path}" "../unsigned-signpath-msi/${msi_name}"
          echo "msi_name=${msi_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload unsigned MSI for SignPath
        id: upload-unsigned-msi
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unsigned-msi-${{ matrix.name }}
          path: unsigned-signpath-msi/${{ steps.package-windows-msi.outputs.msi_name }}
          if-no-files-found: error
          retention-days: 1
          archive: false
          overwrite: true

      - name: Upload unsigned MSI for package job
        id: upload-unsigned-msi-for-package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unsigned-msi-package-${{ matrix.name }}
          path: unsigned-signpath-msi/${{ steps.package-windows-msi.outputs.msi_name }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Upload Windows symbols package
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_symbols || inputs.upload_symbols_artifact
        id: upload-windows-symbols
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: windows-symbols-${{ matrix.name }}
          path: symbols/${{ steps.package-windows-symbols.outputs.symbol_pack_name }}
          if-no-files-found: error
          retention-days: 7
          overwrite: true

      - name: Upload Windows version metadata
        id: upload-windows-version-metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: windows-versioninfo-${{ matrix.name }}
          path: build/generated_versioninfo/windows_versioninfo_generated.h
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Debug wix
        if: always() && steps.package-windows-msi.outcome == 'failure'
        shell: pwsh
        run: |
          $log = Join-Path $PWD 'build\cpack_artifacts\_CPack_Packages\win64\WIX\wix.log'
          if (Test-Path -LiteralPath $log) {
            Get-Content -LiteralPath $log
          } else {
            Write-Host "WiX log was not found: $log"
          }

  sign_windows_msi:
    name: Sign Windows MSI
    needs:
      - build_windows
    if: needs.build_windows.result == 'success'
    runs-on: windows-2022
    outputs:
      signed_msi_artifact_id: ${{ steps.upload-signed-msi.outputs.artifact-id }}
    env:
      SIGNPATH_ENABLED: ${{ secrets.signpath_api_token != '' }}
      SIGNPATH_ORGANIZATION_ID: ${{ inputs.signpath_organization_id }}
      SIGNPATH_PROJECT_SLUG: ${{ inputs.signpath_project_slug }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ inputs.signpath_signing_policy_slug }}
      SIGNPATH_MSI_ARTIFACT_CONFIGURATION_SLUG: ${{ inputs.signpath_msi_artifact_configuration_slug }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Submit SignPath MSI signing request
        if: env.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd  # v2
        with:
          api-token: ${{ secrets.signpath_api_token }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_MSI_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ needs.build_windows.outputs.unsigned_msi_signpath_artifact_id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: signed-signpath-msi
          skip-decompress: true

      - name: Stage signed Windows MSI
        if: env.SIGNPATH_ENABLED == 'true'
        shell: pwsh
        env:
          MSI_NAME: ${{ needs.build_windows.outputs.msi_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $signedRoot = Join-Path $PWD 'signed-signpath-msi'
          if (-not (Test-Path -LiteralPath $signedRoot)) {
            throw "SignPath MSI output directory was not created: $signedRoot"
          }

          $matches = @(Get-ChildItem -LiteralPath $signedRoot -Recurse -File -Filter $env:MSI_NAME)
          if ($matches.Count -ne 1) {
            Get-ChildItem -LiteralPath $signedRoot -Recurse -File | ForEach-Object { Write-Host $_.FullName }
            throw "Expected exactly one signed MSI named '$($env:MSI_NAME)', found $($matches.Count)."
          }

          $msiDir = Join-Path $PWD 'signed-msi'
          New-Item -ItemType Directory -Path $msiDir -Force | Out-Null
          Copy-Item -LiteralPath $matches[0].FullName -Destination (Join-Path $msiDir $env:MSI_NAME) -Force

      - name: Upload signed MSI
        if: env.SIGNPATH_ENABLED == 'true'
        id: upload-signed-msi
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: signed-msi-Windows
          path: signed-msi/${{ needs.build_windows.outputs.msi_name }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: SignPath disabled
        if: env.SIGNPATH_ENABLED != 'true'
        run: Write-Host "SignPath token was not provided; MSI will remain unsigned."

  package_windows:
    name: Package Windows
    needs:
      - build_windows
      - sign_windows_msi
    if: needs.build_windows.result == 'success' && needs.sign_windows_msi.result == 'success'
    runs-on: windows-2022
    outputs:
      installer_name: ${{ steps.package-windows.outputs.installer_name }}
      unsigned_installer_artifact_id: ${{ steps.upload-unsigned-installer-for-finalize.outputs.artifact-id }}
      unsigned_installer_signpath_artifact_id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
    env:
      SIGNPATH_ENABLED: ${{ secrets.signpath_api_token != '' }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0

      - name: Download signed MSI
        if: env.SIGNPATH_ENABLED == 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          artifact-ids: ${{ needs.sign_windows_msi.outputs.signed_msi_artifact_id }}
          path: signed-msi

      - name: Download unsigned MSI
        if: env.SIGNPATH_ENABLED != 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          artifact-ids: ${{ needs.build_windows.outputs.unsigned_msi_artifact_id }}
          path: signed-msi

      - name: Download Windows version metadata
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          artifact-ids: ${{ needs.build_windows.outputs.versioninfo_artifact_id }}
          path: build/generated_versioninfo

      - name: Package Windows
        id: package-windows
        shell: pwsh
        env:
          MSI_NAME: ${{ needs.build_windows.outputs.msi_name }}
          SYMBOL_PRODUCT_NAME: ${{ inputs.symbol_product_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $installerName = "$($env:SYMBOL_PRODUCT_NAME)Setup.exe"
          $signedMsi = Join-Path (Join-Path $PWD 'signed-msi') $env:MSI_NAME
          if (-not (Test-Path -LiteralPath $signedMsi)) {
            throw "MSI artifact was not downloaded: $signedMsi"
          }

          New-Item -ItemType Directory -Path (Join-Path $PWD 'build') -Force | Out-Null
          & (Join-Path $PWD 'packaging/windows/bootstrapper/build_bootstrapper.ps1') `
            -BuildDir (Join-Path $PWD 'build') `
            -MsiPath $signedMsi `
            -OutputName $installerName `
            -DisableSignPath

          $installerExe = Join-Path (Join-Path $PWD 'build/cpack_artifacts') $installerName
          if (-not (Test-Path -LiteralPath $installerExe)) {
            Get-ChildItem -Path (Join-Path $PWD 'build/cpack_artifacts') -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            throw "Expected setup executable was not produced: $installerExe"
          }

          $unsignedDir = Join-Path $PWD 'unsigned-signpath'
          New-Item -ItemType Directory -Path $unsignedDir -Force | Out-Null
          Copy-Item -LiteralPath $installerExe -Destination (Join-Path $unsignedDir $installerName) -Force
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT

      - name: Upload unsigned installer
        id: upload-unsigned-installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unsigned-installer-Windows
          path: unsigned-signpath/${{ steps.package-windows.outputs.installer_name }}
          if-no-files-found: error
          retention-days: 1
          archive: false
          overwrite: true

      - name: Upload unsigned installer for finalize job
        id: upload-unsigned-installer-for-finalize
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unsigned-installer-finalize-Windows
          path: unsigned-signpath/${{ steps.package-windows.outputs.installer_name }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  sign_windows_installer:
    name: Sign Windows installer
    needs:
      - package_windows
    if: needs.package_windows.result == 'success'
    runs-on: windows-2022
    outputs:
      signed_installer_artifact_id: ${{ steps.upload-signed-installer.outputs.artifact-id }}
    env:
      SIGNPATH_ENABLED: ${{ secrets.signpath_api_token != '' }}
      SIGNPATH_ORGANIZATION_ID: ${{ inputs.signpath_organization_id }}
      SIGNPATH_PROJECT_SLUG: ${{ inputs.signpath_project_slug }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ inputs.signpath_signing_policy_slug }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ inputs.signpath_artifact_configuration_slug }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Submit SignPath installer signing request
        if: env.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd  # v2
        with:
          api-token: ${{ secrets.signpath_api_token }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ needs.package_windows.outputs.unsigned_installer_signpath_artifact_id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: signed-signpath
          skip-decompress: true

      - name: Stage signed Windows installer
        if: env.SIGNPATH_ENABLED == 'true'
        shell: pwsh
        env:
          INSTALLER_NAME: ${{ needs.package_windows.outputs.installer_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $signedRoot = Join-Path $PWD 'signed-signpath'
          if (-not (Test-Path -LiteralPath $signedRoot)) {
            throw "SignPath output directory was not created: $signedRoot"
          }

          $matches = @(Get-ChildItem -LiteralPath $signedRoot -Recurse -File -Filter $env:INSTALLER_NAME)
          if ($matches.Count -ne 1) {
            Get-ChildItem -LiteralPath $signedRoot -Recurse -File | ForEach-Object { Write-Host $_.FullName }
            throw "Expected exactly one signed installer named '$($env:INSTALLER_NAME)', found $($matches.Count)."
          }

          $artifactDir = Join-Path $PWD 'signed-installer'
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          Copy-Item -LiteralPath $matches[0].FullName -Destination (Join-Path $artifactDir $env:INSTALLER_NAME) -Force

      - name: Upload signed installer
        if: env.SIGNPATH_ENABLED == 'true'
        id: upload-signed-installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: signed-installer-Windows
          path: signed-installer/${{ needs.package_windows.outputs.installer_name }}
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: SignPath disabled
        if: env.SIGNPATH_ENABLED != 'true'
        run: Write-Host "SignPath token was not provided; installer will remain unsigned."

  finalize_windows:
    name: Finalize Windows artifacts
    needs:
      - build_windows
      - sign_windows_msi
      - package_windows
      - sign_windows_installer
    if: needs.build_windows.result == 'success' && needs.sign_windows_msi.result == 'success' && needs.package_windows.result == 'success' && needs.sign_windows_installer.result == 'success'
    runs-on: windows-2022
    env:
      SIGNPATH_ENABLED: ${{ secrets.signpath_api_token != '' }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download signed installer
        if: env.SIGNPATH_ENABLED == 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          artifact-ids: ${{ needs.sign_windows_installer.outputs.signed_installer_artifact_id }}
          path: artifacts

      - name: Download unsigned installer
        if: env.SIGNPATH_ENABLED != 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          artifact-ids: ${{ needs.package_windows.outputs.unsigned_installer_artifact_id }}
          path: artifacts

      - name: Download signed MSI
        if: env.SIGNPATH_ENABLED == 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          artifact-ids: ${{ needs.sign_windows_msi.outputs.signed_msi_artifact_id }}
          path: signed-msi

      - name: Download symbols package
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_symbols || inputs.upload_symbols_artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          artifact-ids: ${{ needs.build_windows.outputs.symbols_artifact_id }}
          path: symbols

      - name: Include symbols in build artifact
        if: inputs.upload_symbols_artifact
        shell: pwsh
        env:
          SYMBOL_PACK_NAME: ${{ needs.build_windows.outputs.symbol_pack_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $symbolPack = Join-Path (Join-Path $PWD 'symbols') $env:SYMBOL_PACK_NAME
          if (-not (Test-Path -LiteralPath $symbolPack)) {
            Get-ChildItem -Path symbols -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            throw "Private symbol pack not found: $symbolPack"
          }
          New-Item -ItemType Directory -Path (Join-Path $PWD 'artifacts') -Force | Out-Null
          Copy-Item -LiteralPath $symbolPack -Destination (Join-Path $PWD 'artifacts') -Force

      - name: Verify SignPath signatures
        if: env.SIGNPATH_ENABLED == 'true'
        shell: pwsh
        env:
          INSTALLER_NAME: ${{ needs.package_windows.outputs.installer_name }}
          MSI_NAME: ${{ needs.build_windows.outputs.msi_name }}
          REQUIRE_TRUEHDR_RUNTIME: ${{ inputs.require_truehdr_runtime }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ inputs.signpath_signing_policy_slug }}
        run: |
          $ErrorActionPreference = 'Stop'

          # Production signing must produce a fully trusted (Valid) Authenticode chain. The
          # test-signing policy signs with an untrusted SignPath test certificate, whose chain
          # is not Valid on the runner, so in that mode accept any present signature
          # (Status != NotSigned) instead. Switching to a real production signing policy
          # automatically re-enables the strict Valid requirement with no further edits.
          $allowUntrustedSignatures = ($env:SIGNPATH_SIGNING_POLICY_SLUG -eq 'test-signing')

          function Test-Signed([string]$Path) {
            $sig = Get-AuthenticodeSignature -LiteralPath $Path
            if ($null -eq $sig.SignerCertificate) { return $false }
            if ($allowUntrustedSignatures) { return ($sig.Status -ne 'NotSigned') }
            return ($sig.Status -eq 'Valid')
          }

          $failures = New-Object System.Collections.Generic.List[string]

          $installer = Join-Path (Join-Path $PWD 'artifacts') $env:INSTALLER_NAME
          if (-not (Test-Path -LiteralPath $installer)) { throw "Signed installer not found: $installer" }
          if (Test-Signed $installer) {
            $subj = (Get-AuthenticodeSignature -LiteralPath $installer).SignerCertificate.Subject
            Write-Host "[verify] OK   setup EXE signed: $($env:INSTALLER_NAME)  ($subj)"
          } else {
            $failures.Add("setup EXE is UNSIGNED: $($env:INSTALLER_NAME)")
          }

          $signedMsi = Join-Path (Join-Path $PWD 'signed-msi') $env:MSI_NAME
          if (-not (Test-Path -LiteralPath $signedMsi)) { throw "Signed MSI not found: $signedMsi" }
          if (Test-Signed $signedMsi) {
            Write-Host "[verify] OK   MSI container signed: $($env:MSI_NAME)"
          } else {
            $failures.Add("MSI container is UNSIGNED: $($env:MSI_NAME)")
          }

          $extractDir = Join-Path ([System.IO.Path]::GetTempPath()) ("msi-verify-" + [System.Guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          $log = Join-Path $extractDir 'admin-extract.log'
          $argLine = '/a "{0}" /qn TARGETDIR="{1}" /l*v "{2}"' -f $signedMsi, $extractDir, $log
          $proc = Start-Process -FilePath 'msiexec.exe' -ArgumentList $argLine -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            if (Test-Path -LiteralPath $log) { Get-Content -LiteralPath $log -Tail 60 | ForEach-Object { Write-Host $_ } }
            throw "Administrative MSI extraction failed (exit $($proc.ExitCode))."
          }

          $firstParty = @(
            'sunshine.exe','uninstall.exe','libwebrtc.dll','zlib1.dll',
            'sunshinesvc.exe','dxgi-info.exe','audio-info.exe',
            'playnite-launcher.exe','sunshine_wgc_capture.exe','sunshine_display_helper.exe'
          )
          $optionalFirstParty = @('vibeshine_truehdr.dll')
          $vendorSkip = @(
            'SudoVDA.dll','nefconc.exe','SunshineVirtualDisplayDriver.dll','virtualdisplay_probe.exe',
            'VkLayer_sunshine_hdr.dll','nvngx_truehdr.dll','nvngx_vsr.dll'
          )

          $allPe = @(Get-ChildItem -LiteralPath $extractDir -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.dll' })

          foreach ($name in $firstParty) {
            $hits = @($allPe | Where-Object { $_.Name -ieq $name })
            if ($hits.Count -eq 0) {
              $failures.Add("first-party PE missing from MSI: $name")
              continue
            }
            foreach ($f in $hits) {
              if (Test-Signed $f.FullName) {
                Write-Host "[verify] OK   nested signed: $($f.Name)"
              } else {
                $failures.Add("nested first-party PE is UNSIGNED: $($f.FullName)")
              }
            }
          }

          foreach ($name in $optionalFirstParty) {
            $hits = @($allPe | Where-Object { $_.Name -ieq $name })
            if ($hits.Count -eq 0) {
              if ($env:REQUIRE_TRUEHDR_RUNTIME -eq 'true') {
                $failures.Add("required TrueHDR first-party PE missing from MSI: $name")
              }
              continue
            }
            foreach ($f in $hits) {
              if (Test-Signed $f.FullName) {
                Write-Host "[verify] OK   nested signed: $($f.Name)"
              } else {
                $failures.Add("nested TrueHDR first-party PE is UNSIGNED: $($f.FullName)")
              }
            }
          }

          foreach ($f in $allPe) {
            if ($vendorSkip -contains $f.Name) {
              $sig = Get-AuthenticodeSignature -LiteralPath $f.FullName
              Write-Host "[verify] skip vendor/catalog file: $($f.Name) (status=$($sig.Status), signer=$($sig.SignerCertificate.Subject))"
            }
          }

          Remove-Item -LiteralPath $extractDir -Recurse -Force -ErrorAction SilentlyContinue

          if ($failures.Count -gt 0) {
            Write-Host "::error::SignPath nested-signing verification failed ($($failures.Count) issue(s))."
            $failures | ForEach-Object { Write-Host "::error:: - $_" }
            throw "SignPath verification failed. Confirm the 'msi-file-apollo' artifact configuration deep-signs nested PEs in the SignPath portal (see docs/signpath/)."
          }

          Write-Host "[verify] All first-party PEs are signed (outer setup EXE, MSI, and nested binaries)."

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-Windows
          path: artifacts/
          if-no-files-found: error
          overwrite: true

      - name: Publish private symbols release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_symbols
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.symbol_token }}
          RELEASE_TAG: ${{ inputs.release_tag || inputs.release_version }}
          SYMBOL_RELEASE_DRAFT: ${{ inputs.symbol_release_draft }}
          SYMBOL_RELEASE_PREFIX: ${{ inputs.symbol_release_prefix }}
          SYMBOL_RELEASE_TAG: ${{ inputs.symbol_release_tag }}
          SYMBOL_PRODUCT_NAME: ${{ inputs.symbol_product_name }}
          SYMBOLS_REPO: ${{ inputs.symbol_release_repo }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "SYMBOL_TOKEN is required to upload private symbols to $($env:SYMBOLS_REPO)."
          }

          $sourceReleaseTag = $env:RELEASE_TAG
          $releaseVersion = $sourceReleaseTag
          if ($releaseVersion -match '^v(.+)$') {
            $releaseVersion = $Matches[1]
          }

          if ([string]::IsNullOrWhiteSpace($env:SYMBOL_RELEASE_TAG)) {
            if ($releaseVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+((-(alpha|beta|rc|stable)([.-][0-9A-Za-z.-]+)?)|-stable)?$') {
              throw "Unsupported release tag '$sourceReleaseTag'. Expected a release tag like v1.15.2-beta.2."
            }

            if ($env:SYMBOL_RELEASE_PREFIX -notmatch '^(shine|polo)$') {
              throw "Unsupported symbol release prefix '$($env:SYMBOL_RELEASE_PREFIX)'. Expected 'shine' or 'polo'."
            }

            $symbolReleaseTag = "$($env:SYMBOL_RELEASE_PREFIX)_$releaseVersion"
            $prerelease = ($releaseVersion -match '-(alpha|beta|rc)([.-][0-9A-Za-z.-]+)?$')
          } else {
            $symbolReleaseTag = $env:SYMBOL_RELEASE_TAG
            $prerelease = $true
          }

          $draft = ($env:SYMBOL_RELEASE_DRAFT -eq 'true')
          $symbolPack = Join-Path (Join-Path $PWD 'symbols') "$($env:SYMBOL_PRODUCT_NAME)Symbols-$releaseVersion-windows-x64.7z"

          if (-not (Test-Path -LiteralPath $symbolPack)) {
            Get-ChildItem -Path symbols -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            throw "Private symbol pack not found: $symbolPack"
          }

          $releaseTitle = "$($env:SYMBOL_PRODUCT_NAME) symbols v$releaseVersion"
          $releaseNotes = "Private Windows debug symbols for $($env:SYMBOL_PRODUCT_NAME) v$releaseVersion (source release $sourceReleaseTag)."

          function ConvertTo-JqStringLiteral([string] $Value) {
            return $Value.Replace('\', '\\').Replace('"', '\"')
          }

          function Find-Release([string] $Repo, [string] $Tag, [string] $Name) {
            $jqTag = ConvertTo-JqStringLiteral $Tag
            $releaseJson = @(& gh api --paginate "repos/$Repo/releases" --jq ".[] | select(.tag_name == `"$jqTag`") | @json")
            if ($LASTEXITCODE -ne 0) { throw "Failed to list releases for '$Repo'." }

            if ($releaseJson.Count -eq 0) {
              $jqName = ConvertTo-JqStringLiteral $Name
              $releaseJson = @(& gh api --paginate "repos/$Repo/releases" --jq ".[] | select(.draft == true and .name == `"$jqName`") | @json")
              if ($LASTEXITCODE -ne 0) { throw "Failed to list draft releases for '$Repo'." }
            }

            if ($releaseJson.Count -eq 0) { return $null }
            return ($releaseJson[0] | ConvertFrom-Json)
          }

          $draftValue = $draft.ToString().ToLowerInvariant()
          $prereleaseValue = $prerelease.ToString().ToLowerInvariant()
          $release = Find-Release -Repo $env:SYMBOLS_REPO -Tag $symbolReleaseTag -Name $releaseTitle

          if ($null -ne $release) {
            $releaseJson = & gh api `
              --method PATCH `
              "repos/$($env:SYMBOLS_REPO)/releases/$($release.id)" `
              -f "tag_name=$symbolReleaseTag" `
              -f 'target_commitish=main' `
              -f "name=$releaseTitle" `
              -f "body=$releaseNotes" `
              -F "draft=$draftValue" `
              -F "prerelease=$prereleaseValue"
            if ($LASTEXITCODE -ne 0) { throw "Failed to update private symbols release '$symbolReleaseTag'." }
          } else {
            $releaseJson = & gh api `
              --method POST `
              "repos/$($env:SYMBOLS_REPO)/releases" `
              -f "tag_name=$symbolReleaseTag" `
              -f 'target_commitish=main' `
              -f "name=$releaseTitle" `
              -f "body=$releaseNotes" `
              -F "draft=$draftValue" `
              -F "prerelease=$prereleaseValue"
            if ($LASTEXITCODE -ne 0) { throw "Failed to create private symbols release '$symbolReleaseTag'." }
          }

          $release = $releaseJson | ConvertFrom-Json
          $releaseId = $release.id
          if ([string]::IsNullOrWhiteSpace($releaseId)) { throw "Failed to resolve private symbols release id for '$symbolReleaseTag'." }

          $uploadUrl = [string] $release.upload_url
          if ([string]::IsNullOrWhiteSpace($uploadUrl)) { throw "Failed to resolve private symbols upload URL for '$symbolReleaseTag'." }
          $uploadUrl = $uploadUrl -replace '\{.*$', ''

          $assetName = Split-Path -Leaf $symbolPack
          $assetsJson = & gh api "repos/$($env:SYMBOLS_REPO)/releases/$releaseId/assets"
          if ($LASTEXITCODE -ne 0) { throw "Failed to list private symbols assets for '$symbolReleaseTag'." }

          $assetIds = @($assetsJson | ConvertFrom-Json | Where-Object { $_.name -eq $assetName } | Select-Object -ExpandProperty id)
          foreach ($assetId in $assetIds) {
            & gh api --method DELETE "repos/$($env:SYMBOLS_REPO)/releases/assets/$assetId" *> $null
            if ($LASTEXITCODE -ne 0) { throw "Failed to delete existing private symbol asset '$assetName'." }
          }

          $encodedAssetName = [System.Uri]::EscapeDataString($assetName)
          & gh api `
            --method POST `
            "${uploadUrl}?name=${encodedAssetName}" `
            -H 'Content-Type: application/octet-stream' `
            --input $symbolPack `
            *> $null
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload private symbol pack '$symbolPack'." }

          Write-Host "Uploaded $assetName to $($env:SYMBOLS_REPO) release $symbolReleaseTag (id $releaseId)."
